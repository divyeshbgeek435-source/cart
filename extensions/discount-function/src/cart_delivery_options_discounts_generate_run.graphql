query DeliveryInput {
  cart {
    sequentialUnlockLevel: attribute(key: "sce_sequential_unlock") {
      value
    }
    cost {
      subtotalAmount {
        amount
      }
    }
    deliveryGroups {
      id
    }
  }
  discount {
    discountClasses
    metafield(namespace: "default", key: "function-configuration") {
      jsonValue
    }
  }
}
